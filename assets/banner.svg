<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="100%" height="140">
  <style>
    .text-base {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      white-space: nowrap;
      text-anchor: middle;
    }
    .name {
      font-weight: 800;
      font-size: 32px;
      fill: #1BA0D7;
    }
    .title {
      font-weight: 500;
      font-size: 20px;
      fill: #A0AAB2;
    }
  </style>

  <g>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.85;0.92;0.98;1" dur="6s" repeatCount="indefinite" />

    <g clip-path="url(#clip-name)">
      <text x="400" y="45" class="text-base name">FAHAD MUTLAQ ALHARBI</text>
    </g>
    
    <g clip-path="url(#clip-title)">
      <text x="400" y="95" class="text-base title">Cloud Infrastructure &amp; Security Engineer</text>
    </g>
  </g>

  <clipPath id="clip-name">
    <rect x="0" y="0" width="0" height="60">
      <animate attributeName="width" values="0;800;800;800;0;0" keyTimes="0;0.25;0.85;0.92;0.98;1" dur="6s" repeatCount="indefinite" />
    </rect>
  </clipPath>

  <clipPath id="clip-title">
    <rect x="0" y="60" width="0" height="60">
      <animate attributeName="width" values="0;0;800;800;800;0;0" keyTimes="0;0.35;0.70;0.85;0.92;0.98;1" dur="6s" repeatCount="indefinite" />
    </rect>
  </clipPath>
</svg>
